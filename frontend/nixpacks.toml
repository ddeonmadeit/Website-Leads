# Nixpacks config for the standalone frontend service.
# Set API_BASE_URL env var in Railway to point to your backend URL,
# e.g. https://helix-backend.up.railway.app
# serve.js injects it into index.html at runtime so no rebuild is needed.
[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.build]
cmds = ["npm install", "npm run build"]

[start]
cmd = "node serve.js"
