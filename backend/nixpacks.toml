# Nixpacks config for the combined backend+frontend service.
# Chromium apt packages are required for Puppeteer headless scraping.
[phases.setup]
aptPkgs = [
  "chromium",
  "ca-certificates",
  "fonts-liberation",
  "libasound2t64",
  "libatk-bridge2.0-0",
  "libatk1.0-0",
  "libcups2",
  "libdrm2",
  "libgbm1",
  "libgtk-3-0",
  "libnspr4",
  "libnss3",
  "libxcomposite1",
  "libxdamage1",
  "libxfixes3",
  "libxrandr2",
  "xdg-utils"
]

[phases.build]
cmds = [
  "cd ../frontend && npm install && npm run build",
  "npm install --omit=dev"
]

[start]
cmd = "node src/migrate.js && node src/index.js"

[variables]
PUPPETEER_SKIP_DOWNLOAD = "false"
